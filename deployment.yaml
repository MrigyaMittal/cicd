apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-cicd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-cicd
  template:
    metadata:
      labels:
        app: hello-cicd
    spec:
      containers:
      - name: hello-cicd
        image: hello-cicd:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: hello-cicd
spec:
  type: NodePort
  selector:
    app: hello-cicd
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30080